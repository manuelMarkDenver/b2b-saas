services:
  db:
    image: postgres:16
    container_name: b2b_saas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-b2b_saas}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5442}:5432"
    volumes:
      - b2b_saas_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
  mailpit:
    image: axllent/mailpit:latest
    container_name: b2b_saas_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — view sent emails at http://localhost:8025
volumes:
  b2b_saas_pg:
