services:
  - type: web
    name: zentral-api
    runtime: node
    plan: free
    region: singapore
    # Run from monorepo root so pnpm workspace packages (@repo/db etc.) resolve correctly
    # Note: Free plan does not support `preDeployCommand`, so migrations run during build.
    # Render free plan build: ensure devDependencies are installed (Nest CLI is used during build)
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile --prod=false && pnpm --filter @repo/db run generate && pnpm --filter api build && node -e 'const { spawnSync } = require("child_process"); const tries = 5; for (let i = 1; i <= tries; i++) { const r = spawnSync("pnpm", ["--filter", "@repo/db", "run", "migrate:deploy"], { stdio: "inherit" }); if (r.status === 0) process.exit(0); if (i < tries) { console.error("migrate:deploy failed; retrying", { attempt: i, status: r.status }); spawnSync("sleep", ["5"], { stdio: "inherit" }); } } process.exit(1);'
    startCommand: node apps/api/dist/main
    healthCheckPath: /health
    # Only deploy when API, DB, shared, or config files change
    buildFilter:
      paths:
        - apps/api/**
        - packages/db/**
        - packages/shared/**
        - pnpm-lock.yaml
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false   # Neon connection string — set in Render dashboard

      # ── Auth ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false   # Random 64-char string — set in Render dashboard
      - key: JWT_EXPIRES_IN_SECONDS
        value: "86400"

      # ── Logging ──────────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: info
      - key: LOG_PRETTY
        value: "false"

      # ── Rate limiting ─────────────────────────────────────────────────────
      - key: THROTTLE_TTL
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "100"

      # ── CORS — set to your Vercel URL after first deploy ─────────────────
      - key: CORS_ALLOWED_ORIGINS
        # Browser Origin never includes a path or trailing slash.
        value: https://b2b-saas-marketing.vercel.app,https://b2b-saas-web-pi.vercel.app

      # ── URLs ─────────────────────────────────────────────────────────────
      - key: APP_BASE_URL
        value: https://zentral-api-vxoh.onrender.com
      - key: APP_FRONTEND_URL
        value: https://b2b-saas-web-pi.vercel.app

      # ── Email (Resend) ────────────────────────────────────────────────────
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false   # Resend API key — set in Render dashboard
      - key: SMTP_FROM
        sync: false   # e.g. noreply@ascendex.ph

      # ── File storage (Cloudflare R2) ──────────────────────────────────────
      - key: STORAGE_TYPE
        value: s3     # 's3' works for both AWS S3 and Cloudflare R2
      - key: AWS_REGION
        value: auto   # R2 uses 'auto'; for AWS S3 use your bucket region
      - key: AWS_S3_ENDPOINT
        sync: false   # R2: https://<account-id>.r2.cloudflarestorage.com
      - key: AWS_ACCESS_KEY_ID
        sync: false   # R2 Access Key ID — set in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false   # R2 Secret Access Key — set in Render dashboard
      - key: AWS_S3_BUCKET
        sync: false   # R2 bucket name, e.g. ascendex-uploads
      - key: AWS_S3_PUBLIC_URL
        sync: false   # R2 public URL, e.g. https://pub-xxxx.r2.dev
